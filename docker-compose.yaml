name: recsys-ecommerce

services:
  mlflow:
    build: .
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:///mlflow-data/mlflow.db
      - --default-artifact-root
      - /app/mlflow-data/artifacts
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --allowed-hosts
      - "mlflow,mlflow:5000,localhost,localhost:5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/app/mlflow-data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  train:
    build: .
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    command: ["sh", "-c", "dvc pull && dvc repro"]

volumes:
  mlflow-data:
